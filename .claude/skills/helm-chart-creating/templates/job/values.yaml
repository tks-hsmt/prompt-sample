# =============================================================================
# C-01: イメージ設定
# =============================================================================

# -- image はコンテナイメージの設定（リポジトリ、digest、プルポリシー）
image:
  # -- repository はコンテナイメージのリポジトリ（必須・空文字不可）
  repository: ""
  # -- digest はコンテナイメージの sha256 ダイジェスト（必須・タグの可変性を排除しイメージを完全固定する）
  digest: ""
  # -- pullPolicy はイメージのプルポリシー
  pullPolicy: IfNotPresent

# =============================================================================
# C-02: 名前オーバーライド
# =============================================================================

nameOverride: ""
# -- fullnameOverride はリソース名のフルネーム部分を上書きする
fullnameOverride: ""

# =============================================================================
# C-03: サービスアカウント
# =============================================================================

# -- serviceAccount は ServiceAccount の作成・設定（create, automountToken で制御）
serviceAccount:
  # -- create は ServiceAccount を作成するかどうかを制御する
  create: true
  # -- annotations は Ingress に付与するアノテーション
  annotations: {}
  # -- name は ServiceAccount 名（空の場合は fullname テンプレートで生成）
  name: ""
  # -- automountToken は API トークンのマウントを制御する（K8s API アクセスが不要なら false）
  automountToken: false

# =============================================================================
# C-04: RBAC
# =============================================================================

rbac:
  # -- create は RBAC リソースを作成するかどうかを制御する
  create: false

# =============================================================================
# C-05: Pod セキュリティコンテキスト
# =============================================================================

# -- podSecurityContext は Pod レベルのセキュリティ設定（非root実行、UID/GID、seccompプロファイル）
podSecurityContext:
  # -- runAsNonRoot は Pod 内の全コンテナを非 root ユーザーで実行することを強制する
  runAsNonRoot: true
  # -- runAsUser は Pod 内の全プロセスの実行ユーザー ID
  runAsUser: 1000
  # -- runAsGroup は Pod 内の全プロセスのプライマリグループ ID
  runAsGroup: 1000
  # -- fsGroup はマウントされたボリュームの所有グループ ID
  fsGroup: 1000
  # -- seccompProfile はコンテナランタイムのシステムコールフィルタリング設定
  seccompProfile:
    type: RuntimeDefault

# =============================================================================
# C-06: コンテナセキュリティコンテキスト
# =============================================================================

# -- containerSecurityContext はコンテナレベルのセキュリティ設定（権限昇格拒否、読み取り専用FS、ケーパビリティ制御）
containerSecurityContext:
  # -- allowPrivilegeEscalation は権限昇格を拒否する（false 必須）
  allowPrivilegeEscalation: false
  # -- readOnlyRootFilesystem はルートファイルシステムを読み取り専用にする
  readOnlyRootFilesystem: true
  # -- runAsNonRoot は Pod 内の全コンテナを非 root ユーザーで実行することを強制する
  runAsNonRoot: true
  # -- runAsUser は Pod 内の全プロセスの実行ユーザー ID
  runAsUser: 1000
  # -- capabilities は Linux ケーパビリティの制御（ALL を drop して必要なもののみ add）
  capabilities:
    drop:
      - ALL

# =============================================================================
# C-07: リソース制限
# =============================================================================

# -- resources はコンテナのリソース要求量（requests）と上限（limits）
resources:
  # -- requests はスケジューリング時に保証されるリソース量
  requests:
    cpu: 100m
    memory: 128Mi
  # -- limits はコンテナが使用可能なリソースの上限
  limits:
    cpu: 500m
    memory: 256Mi

# =============================================================================
# J-01: リスタートポリシー（必須 — Never または OnFailure のみ、Always は不可）
# =============================================================================

# -- restartPolicy は Never または OnFailure のみ（Always は Job では使用不可）
restartPolicy: Never

# =============================================================================
# J-02: バックオフ制限
# =============================================================================

# -- backoffLimit は Job を失敗と見なすまでのリトライ回数
backoffLimit: 6

# =============================================================================
# J-03: アクティブデッドライン
# =============================================================================

# -- activeDeadlineSeconds は Job 全体のタイムアウト秒数（無限ループ防止）
activeDeadlineSeconds: 3600

# =============================================================================
# J-04: 完了後 TTL
# =============================================================================

# -- ttlSecondsAfterFinished は Job 完了後にリソースを保持する秒数（自動クリーンアップ）
ttlSecondsAfterFinished: 86400

# =============================================================================
# J-05: 完了数
# =============================================================================

# -- completions は成功とみなすために必要な Pod 完了数
completions: 1

# =============================================================================
# J-06: 並列数
# =============================================================================

# -- parallelism は同時に実行可能な Pod の最大数
parallelism: 1

# =============================================================================
# J-07: ネットワークポリシー
# =============================================================================

networkPolicy:
  # -- enabled は NetworkPolicy リソースを作成するかどうかを制御する
  enabled: false

# =============================================================================
# J-08: ConfigMap
# =============================================================================

config:
  # -- enabled は values から ConfigMap を作成するかどうかを制御する
  enabled: false

# =============================================================================
# C-08: Pod メタデータ
# =============================================================================

podAnnotations: {}
# -- podLabels は Pod に付与する追加ラベル
podLabels: {}

# =============================================================================
# C-09: スケジューリング
# =============================================================================

nodeSelector: {}
# -- tolerations は taint されたノードへの Pod スケジューリングを許可する
tolerations: []
# -- affinity は Pod のスケジューリングルールを定義する
affinity: {}
# -- topologySpreadConstraints は HA のために Pod をトポロジードメインに分散配置する
topologySpreadConstraints: []
# -- priorityClassName は Pod の優先度を設定する
priorityClassName: ""

# =============================================================================
# C-10: DNS 設定
# =============================================================================

dnsPolicy: ClusterFirst
# -- dnsConfig はカスタム DNS 設定
dnsConfig: {}

# =============================================================================
# C-11: 初期化・終了
# =============================================================================

# -- initContainers は Pod の追加初期化コンテナ
# 利用例:
# initContainers:
#   - name: init-config
#     image: busybox:1.36
#     command: ['sh', '-c', 'cp /config/* /shared/']
#     volumeMounts:
#       - name: config
#         mountPath: /shared
initContainers: []
# -- terminationGracePeriodSeconds はグレースフルシャットダウンの待機秒数
terminationGracePeriodSeconds: 30

# =============================================================================
# C-12: 拡張ポイント
# =============================================================================

extraEnv: []
# -- extraEnvFrom は追加の環境変数ソース（ConfigMap/Secret 参照）のリスト
extraEnvFrom: []
# -- extraVolumeMounts はメインコンテナの追加ボリュームマウントのリスト
extraVolumeMounts: []
# -- extraVolumes は Pod の追加ボリュームのリスト
extraVolumes: []
# -- extraLabels は全リソースに追加するラベル
extraLabels: {}
# -- imagePullSecrets はプライベートレジストリの認証シークレットのリスト
imagePullSecrets: []
