# =============================================================================
# 開発環境オーバーライド
# =============================================================================

replicaCount: 1

image:
  # CI/CD でビルド後に --set image.digest=sha256:<digest> で設定する
  digest: ""

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  enabled: true
  size: 1Gi

ingress:
  enabled: false

networkPolicy:
  enabled: false

terminationGracePeriodSeconds: 30
