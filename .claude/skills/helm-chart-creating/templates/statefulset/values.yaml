# =============================================================================
# C-01: イメージ設定
# =============================================================================

# -- image はコンテナイメージの設定（リポジトリ、digest、プルポリシー）
image:
  # -- repository はコンテナイメージのリポジトリ（必須・空文字不可）
  repository: ""
  # -- digest はコンテナイメージの sha256 ダイジェスト（必須・タグの可変性を排除しイメージを完全固定する）
  digest: ""
  # -- pullPolicy はイメージのプルポリシー
  pullPolicy: IfNotPresent

# =============================================================================
# SS-01: StatefulSet レプリカ数
# =============================================================================

# -- replicaCount は Pod のレプリカ数 (each with stable identity and storage)
replicaCount: 1

# =============================================================================
# SS-02: Pod 管理ポリシー
# =============================================================================

# -- podManagementPolicy は Pod の作成順序を制御する（OrderedReady または Parallel）
podManagementPolicy: OrderedReady

# =============================================================================
# C-02: 名前オーバーライド
# =============================================================================

nameOverride: ""
# -- fullnameOverride はリソース名のフルネーム部分を上書きする
fullnameOverride: ""

# =============================================================================
# C-03: サービスアカウント
# =============================================================================

# -- serviceAccount は ServiceAccount の作成・設定（create, automountToken で制御）
serviceAccount:
  # -- create は ServiceAccount を作成するかどうかを制御する
  create: true
  # -- annotations は Ingress に付与するアノテーション
  annotations: {}
  # -- name は ServiceAccount 名（空の場合は fullname テンプレートで生成）
  name: ""
  # -- automountToken は API トークンのマウントを制御する（K8s API アクセスが不要なら false）
  automountToken: false

# =============================================================================
# C-04: RBAC
# =============================================================================

rbac:
  # -- create は RBAC リソースを作成するかどうかを制御する
  create: false

# =============================================================================
# C-05: Pod セキュリティコンテキスト
# =============================================================================

# -- podSecurityContext は Pod レベルのセキュリティ設定（非root実行、UID/GID、seccompプロファイル）
podSecurityContext:
  # -- runAsNonRoot は Pod 内の全コンテナを非 root ユーザーで実行することを強制する
  runAsNonRoot: true
  # -- runAsUser は Pod 内の全プロセスの実行ユーザー ID
  runAsUser: 1000
  # -- runAsGroup は Pod 内の全プロセスのプライマリグループ ID
  runAsGroup: 1000
  # -- fsGroup はマウントされたボリュームの所有グループ ID
  fsGroup: 1000
  # -- seccompProfile はコンテナランタイムのシステムコールフィルタリング設定
  seccompProfile:
    type: RuntimeDefault

# =============================================================================
# C-06: コンテナセキュリティコンテキスト
# =============================================================================

# -- containerSecurityContext はコンテナレベルのセキュリティ設定（権限昇格拒否、読み取り専用FS、ケーパビリティ制御）
containerSecurityContext:
  # -- allowPrivilegeEscalation は権限昇格を拒否する（false 必須）
  allowPrivilegeEscalation: false
  # -- readOnlyRootFilesystem はルートファイルシステムを読み取り専用にする
  readOnlyRootFilesystem: true
  # -- runAsNonRoot は Pod 内の全コンテナを非 root ユーザーで実行することを強制する
  runAsNonRoot: true
  # -- runAsUser は Pod 内の全プロセスの実行ユーザー ID
  runAsUser: 1000
  # -- capabilities は Linux ケーパビリティの制御（ALL を drop して必要なもののみ add）
  capabilities:
    drop:
      - ALL

# =============================================================================
# SS-05: Service（StatefulSet では Headless Service が必須）
# =============================================================================

# -- service は Kubernetes Service の設定（headless: true で Headless Service も作成。StatefulSet の serviceName に必須）
service:
  # -- type は Kubernetes Service のタイプ
  type: ClusterIP
  # -- port は Service が公開するポート番号
  port: 80
  # -- containerPort はコンテナが実際にリッスンするポート番号
  containerPort: 8080
  # -- portName はポートの名前（probes や Service の targetPort で参照される）
  portName: http
  # -- protocol はポートのプロトコル（TCP または UDP）
  protocol: TCP
  # -- headless は Headless Service（clusterIP: None）を作成するかどうかを制御する（StatefulSet で必須）
  headless: true

# =============================================================================
# C-07: リソース制限
# =============================================================================

# -- resources はコンテナのリソース要求量（requests）と上限（limits）
resources:
  # -- requests はスケジューリング時に保証されるリソース量
  requests:
    cpu: 100m
    memory: 128Mi
  # -- limits はコンテナが使用可能なリソースの上限
  limits:
    cpu: 500m
    memory: 256Mi

# =============================================================================
# SS-06: Ingress
# =============================================================================

ingress:
  # -- enabled は Ingress リソースを作成するかどうかを制御する
  enabled: false
  # -- className は使用する IngressClass 名
  className: ""
  # -- annotations は Ingress に付与するアノテーション
  annotations: {}
  # -- hosts はホスト名とパスのルーティングルールのリスト
  hosts: []
  # -- tls は TLS 証明書の設定リスト
  tls: []

# =============================================================================
# SS-07: ライブネスプローブ
# =============================================================================

# -- livenessProbe はコンテナの生存確認（失敗時に再起動。httpGet.port は service.portName と一致させること）
livenessProbe:
  # -- httpGet はヘルスチェックの HTTP エンドポイント設定（port は service.portName と一致させること）
  httpGet:
    path: /healthz
    port: http
  # -- initialDelaySeconds はコンテナ起動後にプローブを開始するまでの待機秒数
  initialDelaySeconds: 30
  # -- periodSeconds はプローブの実行間隔秒数
  periodSeconds: 10
  # -- failureThreshold はプローブ失敗と判定するまでの連続失敗回数
  failureThreshold: 3

# =============================================================================
# SS-08: レディネスプローブ
# =============================================================================

# -- readinessProbe はトラフィック受信可否の判定（失敗時に Service から除外。httpGet.port は service.portName と一致させること）
readinessProbe:
  # -- httpGet はヘルスチェックの HTTP エンドポイント設定（port は service.portName と一致させること）
  httpGet:
    path: /ready
    port: http
  # -- initialDelaySeconds はコンテナ起動後にプローブを開始するまでの待機秒数
  initialDelaySeconds: 5
  # -- periodSeconds はプローブの実行間隔秒数
  periodSeconds: 5

# =============================================================================
# SS-09: スタートアッププローブ
# =============================================================================

startupProbe:
  # -- enabled は startupProbe を設定するかどうかを制御する（DB では有効化を推奨）
  enabled: false
  # -- httpGet はヘルスチェックの HTTP エンドポイント設定
  httpGet:
    path: /healthz
    port: http
  # -- failureThreshold はプローブ失敗と判定するまでの連続失敗回数
  failureThreshold: 30
  # -- periodSeconds はプローブの実行間隔秒数
  periodSeconds: 10

# =============================================================================
# SS-10: オートスケーリング（HPA）
# =============================================================================

autoscaling:
  # -- enabled は HorizontalPodAutoscaler を作成するかどうかを制御する
  enabled: false
  # -- minReplicas は最小レプリカ数
  minReplicas: 1
  # -- maxReplicas は最大レプリカ数
  maxReplicas: 10
  # -- targetCPUUtilizationPercentage はスケールアウトのCPU使用率閾値
  targetCPUUtilizationPercentage: 80

# =============================================================================
# SS-11: Pod 中断予算（PDB）
# =============================================================================

podDisruptionBudget:
  # -- enabled は PodDisruptionBudget を作成するかどうかを制御する
  enabled: false
  # -- minAvailable はノードドレイン時に維持する最小 Pod 数
  minAvailable: 1

# =============================================================================
# SS-12: ネットワークポリシー
# =============================================================================

networkPolicy:
  # -- enabled は NetworkPolicy リソースを作成するかどうかを制御する
  enabled: false

# =============================================================================
# SS-03: 更新戦略
# =============================================================================

# -- updateStrategy は StatefulSet の更新戦略（RollingUpdate: partition でカナリアデプロイ可能、OnDelete: 手動更新）
updateStrategy:
  # -- type は StatefulSet の更新戦略（RollingUpdate または OnDelete）
  type: RollingUpdate
  # -- rollingUpdate はローリングアップデートの詳細設定
  rollingUpdate:
    # -- partition はこの値以上の序数を持つ Pod のみ更新する（カナリアデプロイ用）
    partition: 0

# =============================================================================
# SS-04: リビジョン履歴保持数
# =============================================================================

revisionHistoryLimit: 10

# =============================================================================
# SS-13: 永続化（volumeClaimTemplates — Pod 毎の PVC）
# =============================================================================

# -- persistence は volumeClaimTemplates の設定（Pod ごとに個別 PVC が自動作成される。storageClass/accessModes/size で PVC スペック定義）
persistence:
  # -- enabled は volumeClaimTemplates を作成するかどうかを制御する
  enabled: true
  # -- storageClass は StorageClass 名（空の場合はクラスタデフォルトを使用）
  storageClass: ""
  # -- accessModes は PVC のアクセスモード
  accessModes:
    - ReadWriteOnce
  # -- size は PVC のストレージサイズ
  size: 10Gi

# =============================================================================
# SS-14: PVC 保持ポリシー（K8s 1.27+）
# =============================================================================

persistentVolumeClaimRetentionPolicy:
  # -- whenDeleted は StatefulSet 削除時の PVC 保持ポリシー（Retain または Delete）
  whenDeleted: Retain
  # -- whenScaled はスケールダウン時の PVC 保持ポリシー（Retain または Delete）
  whenScaled: Retain

# =============================================================================
# SS-15: ConfigMap
# =============================================================================

config:
  # -- enabled は values から ConfigMap を作成するかどうかを制御する
  enabled: false

# =============================================================================
# C-08: Pod メタデータ
# =============================================================================

podAnnotations: {}
# -- podLabels は Pod に付与する追加ラベル
podLabels: {}

# =============================================================================
# C-09: スケジューリング
# =============================================================================

nodeSelector: {}
# -- tolerations は taint されたノードへの Pod スケジューリングを許可する
tolerations: []
# -- affinity は Pod のスケジューリングルールを定義する
affinity: {}
# -- topologySpreadConstraints は HA のために Pod をトポロジードメインに分散配置する
topologySpreadConstraints: []
# -- priorityClassName は Pod の優先度を設定する
priorityClassName: ""

# =============================================================================
# C-10: DNS 設定
# =============================================================================

dnsPolicy: ClusterFirst
# -- dnsConfig はカスタム DNS 設定
dnsConfig: {}

# =============================================================================
# C-11: 初期化・終了
# =============================================================================

# -- initContainers は Pod の追加初期化コンテナ
# 利用例:
# initContainers:
#   - name: init-config
#     image: busybox:1.36
#     command: ['sh', '-c', 'cp /config/* /shared/']
#     volumeMounts:
#       - name: config
#         mountPath: /shared
initContainers: []
# -- terminationGracePeriodSeconds はDB等ではデフォルト30秒では不足するため増加が必要
terminationGracePeriodSeconds: 30

# =============================================================================
# C-12: 拡張ポイント
# =============================================================================

extraEnv: []
# -- extraEnvFrom は追加の環境変数ソース（ConfigMap/Secret 参照）のリスト
extraEnvFrom: []
# -- extraVolumeMounts はメインコンテナの追加ボリュームマウントのリスト
extraVolumeMounts: []
# -- extraVolumes は Pod の追加ボリュームのリスト
extraVolumes: []
# -- extraLabels は全リソースに追加するラベル
extraLabels: {}
# -- imagePullSecrets はプライベートレジストリの認証シークレットのリスト
imagePullSecrets: []
