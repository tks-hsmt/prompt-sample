# =============================================================================
# ステージング環境オーバーライド
# =============================================================================

replicaCount: 2

image:
  # CI/CD でビルド後に --set image.digest=sha256:<digest> で設定する
  digest: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

persistence:
  enabled: true
  size: 10Gi

terminationGracePeriodSeconds: 60
