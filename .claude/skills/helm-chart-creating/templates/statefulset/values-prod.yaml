# =============================================================================
# 本番環境オーバーライド
# =============================================================================

replicaCount: 3

image:
  # CI/CD でビルド後に --set image.digest=sha256:<digest> で設定する
  digest: ""

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

persistence:
  enabled: true
  storageClass: ""  # 本番環境の StorageClass を設定する
  size: 50Gi

ingress:
  enabled: true
  hosts:
    - host: db.example.com
      paths:
        - path: /
          pathType: Prefix

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

terminationGracePeriodSeconds: 120

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels: {}
