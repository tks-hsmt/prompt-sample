# =============================================================================
# 開発環境オーバーライド
# =============================================================================

# -- 開発環境ではテスト用に頻度を上げることが可能
schedule: "*/5 * * * *"
timeZone: "Asia/Tokyo"

image:
  # CI/CD でビルド後に --set image.digest=sha256:<digest> で設定する
  digest: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

activeDeadlineSeconds: 600
backoffLimit: 1

# -- 開発環境では CronJob を一時停止するために使用可能
suspend: false
