# =============================================================================
# ステージング環境オーバーライド
# =============================================================================

schedule: "0 * * * *"
timeZone: "Asia/Tokyo"

image:
  # CI/CD でビルド後に --set image.digest=sha256:<digest> で設定する
  digest: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
