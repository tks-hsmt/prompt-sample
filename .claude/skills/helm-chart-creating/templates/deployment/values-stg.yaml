# =============================================================================
# ステージング環境オーバーライド
# =============================================================================

replicaCount: 2

image:
  # CI/CD でビルド後に --set image.digest=sha256:<digest> で設定する
  digest: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

ingress:
  enabled: true
  className: ""
  hosts:
    - host: app-stg.example.com
      paths:
        - path: /
          pathType: Prefix

# extraEnv:
#   - name: LOG_LEVEL
#     value: info
