# =============================================================================
# C-01: イメージ設定
# =============================================================================

# -- image はコンテナイメージの設定（リポジトリ、digest、プルポリシー）
image:
  # -- repository はコンテナイメージのリポジトリ（必須・空文字不可）
  repository: ""
  # -- digest はコンテナイメージの sha256 ダイジェスト（必須・タグの可変性を排除しイメージを完全固定する）
  digest: ""
  # -- pullPolicy はイメージのプルポリシー
  pullPolicy: IfNotPresent

# =============================================================================
# C-02: 名前オーバーライド
# =============================================================================

# -- nameOverride はリソース名のチャート名部分を上書きする
nameOverride: ""
# -- fullnameOverride はリソース名のフルネーム部分を上書きする
fullnameOverride: ""

# =============================================================================
# C-03: サービスアカウント
# =============================================================================

# -- serviceAccount は ServiceAccount の作成・設定（create, automountToken で制御）
serviceAccount:
  # -- create は ServiceAccount を作成するかどうかを制御する
  create: true
  # -- annotations は ServiceAccount に付与するアノテーション（例: IRSA の IAM ロール）
  annotations: {}
  # -- name は ServiceAccount 名（空の場合は fullname テンプレートで生成）
  name: ""
  # -- automountToken は API トークンのマウントを制御する（K8s API アクセスが不要なら false）
  automountToken: false

# =============================================================================
# C-04: RBAC
# =============================================================================

rbac:
  # -- create は RBAC リソースを作成するかどうかを制御する（アプリが K8s API にアクセスする場合に有効化）
  create: false

# =============================================================================
# C-05: Pod セキュリティコンテキスト
# =============================================================================

# -- podSecurityContext は Pod レベルのセキュリティ設定（非root実行、UID/GID、seccompプロファイル）
podSecurityContext:
  # -- runAsNonRoot は Pod 内の全コンテナを非 root ユーザーで実行することを強制する
  runAsNonRoot: true
  # -- runAsUser は Pod 内の全プロセスの実行ユーザー ID
  runAsUser: 1000
  # -- runAsGroup は Pod 内の全プロセスのプライマリグループ ID
  runAsGroup: 1000
  # -- fsGroup はマウントされたボリュームの所有グループ ID
  fsGroup: 1000
  # -- seccompProfile はコンテナランタイムのシステムコールフィルタリング設定
  seccompProfile:
    type: RuntimeDefault

# =============================================================================
# C-06: コンテナセキュリティコンテキスト
# =============================================================================

# -- containerSecurityContext はコンテナレベルのセキュリティ設定（権限昇格拒否、読み取り専用FS、ケーパビリティ制御）
containerSecurityContext:
  # -- allowPrivilegeEscalation は権限昇格を拒否する（false 必須）
  allowPrivilegeEscalation: false
  # -- readOnlyRootFilesystem はルートファイルシステムを読み取り専用にする
  readOnlyRootFilesystem: true
  # -- runAsNonRoot は Pod 内の全コンテナを非 root ユーザーで実行することを強制する
  runAsNonRoot: true
  # -- runAsUser は Pod 内の全プロセスの実行ユーザー ID
  runAsUser: 1000
  # -- capabilities は Linux ケーパビリティの制御（ALL を drop して必要なもののみ add）
  capabilities:
    drop:
      - ALL

# =============================================================================
# C-07: リソース制限
# =============================================================================

# -- resources はコンテナのリソース要求量（requests）と上限（limits）
resources:
  # -- requests はスケジューリング時に保証されるリソース量
  requests:
    cpu: 100m
    memory: 128Mi
  # -- limits はコンテナが使用可能なリソースの上限
  limits:
    cpu: 500m
    memory: 256Mi

# =============================================================================
# DS-01: 更新戦略
# =============================================================================

# -- updateStrategy は DaemonSet の更新戦略（RollingUpdate: maxUnavailable/maxSurge で段階的更新、OnDelete: 手動更新）
updateStrategy:
  # -- type は DaemonSet の更新戦略（RollingUpdate または OnDelete）
  type: RollingUpdate
  # -- rollingUpdate はローリングアップデートの詳細設定
  rollingUpdate:
    # -- maxUnavailable は同時に停止可能な Pod 数（デフォルト 1。大規模クラスタでは "10%" 等で更新速度を調整）
    maxUnavailable: 1
    # -- maxSurge は更新時に一時的に余分に作成する Pod 数（K8s 1.22+。0 の場合は旧 Pod 停止後に新 Pod 起動のため一時的にサービスが途切れる）
    maxSurge: 0

# =============================================================================
# DS-02: リビジョン履歴保持数
# =============================================================================

# -- revisionHistoryLimit は保持する古い DaemonSet リビジョンの数
revisionHistoryLimit: 10

# =============================================================================
# DS-03: ホストネットワーク
# =============================================================================

# -- hostNetwork はノードのネットワーク名前空間を共有する（dnsPolicy: ClusterFirstWithHostNet が必要）
hostNetwork: false

# =============================================================================
# DS-04: ホスト PID
# =============================================================================

# -- hostPID はノードの PID 名前空間を共有する（ノードモニタリング用）
hostPID: false

# =============================================================================
# DS-05: ホストポート
# =============================================================================

# -- hostPort はコンテナポートをホストの特定ポートにバインドする（必要時にコメント解除）
# hostPort: 8080

# =============================================================================
# DS-06: Service（条件付き — 多くの DaemonSet では Service 不要）
# =============================================================================

# -- service は DaemonSet 用 Service の設定（enabled: false がデフォルト。ノードエージェントでは通常不要）
service:
  # -- enabled は DaemonSet 用の Service を作成するかどうかを制御する
  enabled: false
  # -- type は Kubernetes Service のタイプ
  type: ClusterIP
  # -- port は Service が公開するポート番号
  port: 80
  # -- containerPort はコンテナが実際にリッスンするポート番号
  containerPort: 8080
  # -- portName はポートの名前（probes や Service の targetPort で参照される）
  portName: http
  # -- protocol はポートのプロトコル（TCP または UDP）
  protocol: TCP

# =============================================================================
# DS-07: ライブネスプローブ
# =============================================================================

# -- livenessProbe はコンテナの生存確認（失敗時に再起動。httpGet.port は service.portName と一致させること）
livenessProbe:
  # -- httpGet はヘルスチェックの HTTP エンドポイント設定（port は service.portName と一致させること）
  httpGet:
    path: /healthz
    port: http
  # -- initialDelaySeconds はコンテナ起動後にプローブを開始するまでの待機秒数
  initialDelaySeconds: 30
  # -- periodSeconds はプローブの実行間隔秒数
  periodSeconds: 10
  # -- failureThreshold はプローブ失敗と判定するまでの連続失敗回数
  failureThreshold: 3

# =============================================================================
# DS-08: レディネスプローブ
# =============================================================================

# -- readinessProbe はトラフィック受信可否の判定（失敗時に Service から除外。httpGet.port は service.portName と一致させること）
readinessProbe:
  # -- httpGet はヘルスチェックの HTTP エンドポイント設定（port は service.portName と一致させること）
  httpGet:
    path: /ready
    port: http
  # -- initialDelaySeconds はコンテナ起動後にプローブを開始するまでの待機秒数
  initialDelaySeconds: 5
  # -- periodSeconds はプローブの実行間隔秒数
  periodSeconds: 5

# =============================================================================
# DS-09: スタートアッププローブ
# =============================================================================

startupProbe:
  # -- enabled は startupProbe を設定するかどうかを制御する（起動の遅いアプリで有効化）
  enabled: false
  # -- httpGet はヘルスチェックの HTTP エンドポイント設定
  httpGet:
    path: /healthz
    port: http
  # -- failureThreshold はプローブ失敗と判定するまでの連続失敗回数
  failureThreshold: 30
  # -- periodSeconds はプローブの実行間隔秒数
  periodSeconds: 10

# =============================================================================
# DS-10: ネットワークポリシー
# =============================================================================

networkPolicy:
  # -- enabled は NetworkPolicy リソースを作成するかどうかを制御する
  enabled: false

# =============================================================================
# DS-11: ConfigMap
# =============================================================================

config:
  # -- enabled は values から ConfigMap を作成するかどうかを制御する
  enabled: false

# =============================================================================
# C-08: Pod メタデータ
# =============================================================================

# -- podAnnotations は Pod に付与する追加アノテーション
podAnnotations: {}
# -- podLabels は Pod に付与する追加ラベル
podLabels: {}

# =============================================================================
# C-09: スケジューリング (nodeSelector/tolerations are especially important for DaemonSets)
# =============================================================================

# -- nodeSelector は一致するラベルを持つノードに Pod を制約する
nodeSelector: {}
# -- tolerations は taint されたノードへの Pod スケジューリングを許可する
tolerations: []
# -- affinity は Pod のスケジューリングルールを定義する
affinity: {}
# -- topologySpreadConstraints は HA のために Pod をトポロジードメインに分散配置する
topologySpreadConstraints: []
# -- priorityClassName は Pod の優先度を設定する（DaemonSet では system-node-critical を推奨）
priorityClassName: ""

# =============================================================================
# C-10: DNS 設定
# =============================================================================

# -- dnsPolicy は Pod の DNS ポリシー (must be ClusterFirstWithHostNet when hostNetwork is true)
dnsPolicy: ClusterFirst
# -- dnsConfig はカスタム DNS 設定
dnsConfig: {}

# =============================================================================
# C-11: 初期化・終了
# =============================================================================

# -- initContainers は Pod の追加初期化コンテナ
# 利用例:
# initContainers:
#   - name: init-config
#     image: busybox:1.36
#     command: ['sh', '-c', 'cp /config/* /shared/']
#     volumeMounts:
#       - name: config
#         mountPath: /shared
initContainers: []
# -- terminationGracePeriodSeconds はグレースフルシャットダウンの待機秒数
terminationGracePeriodSeconds: 30

# =============================================================================
# C-12: 拡張ポイント
# =============================================================================

# -- extraEnv は追加の環境変数リスト
extraEnv: []
# -- extraEnvFrom は追加の環境変数ソース（ConfigMap/Secret 参照）のリスト
extraEnvFrom: []
# -- extraVolumeMounts はメインコンテナの追加ボリュームマウントのリスト
extraVolumeMounts: []
# -- extraVolumes は Pod の追加ボリュームのリスト
extraVolumes: []
# -- extraLabels は全リソースに追加するラベル
extraLabels: {}
# -- imagePullSecrets はプライベートレジストリの認証シークレットのリスト
imagePullSecrets: []
