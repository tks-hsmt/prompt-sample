# =============================================================================
# 本番環境オーバーライド
# =============================================================================

image:
  # CI/CD でビルド後に --set image.digest=sha256:<digest> で設定する
  digest: ""

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

networkPolicy:
  enabled: true

# -- priorityClassName はリソース逼迫時に DaemonSet の Pod が evict されないようにする
priorityClassName: system-node-critical

# -- マスターノードを含む全ノードで実行するための tolerations（クラスタに合わせて調整）
tolerations:
  - operator: Exists
