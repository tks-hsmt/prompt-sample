apiVersion: v1
kind: Service
metadata:
  # FQDN: com-notifier-svc.gems-ip.svc.cluster.local
  name: com-notifier-svc
  namespace: gems-ip
  labels:
    {{- include "com-notifier-stub.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "com-notifier-stub.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
