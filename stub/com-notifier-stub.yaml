# ============================================================
# com-notifier-svc stub manifests (ECR イメージ版)
# Namespace: gems-ip
# Service FQDN: com-notifier-svc.gems-ip.svc.cluster.local
# Endpoints: POST /trap  /syslog  /ipcrx → 202 { "status": "accepted" }
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: gems-ip

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: com-notifier-stub
  namespace: gems-ip
  labels:
    app: com-notifier-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: com-notifier-stub
  template:
    metadata:
      labels:
        app: com-notifier-stub
    spec:
      containers:
        - name: stub
          # ── ECR イメージに差し替えてください ─────────────────
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/com-notifier-stub:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      securityContext:
        fsGroup: 65534

---
apiVersion: v1
kind: Service
metadata:
  name: com-notifier-svc
  namespace: gems-ip
  labels:
    app: com-notifier-stub
spec:
  selector:
    app: com-notifier-stub
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
