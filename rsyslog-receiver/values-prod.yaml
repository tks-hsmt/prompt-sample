# values-prod.yaml - 本番環境オーバーライド
replicaCount: 2

image:
  repository: "docker.io/rsyslog/syslog_appliance_alpine"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

service:
  type: LoadBalancer
  port: 514
  containerPort: 1514
  portName: "syslog-udp"
  protocol: UDP

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
